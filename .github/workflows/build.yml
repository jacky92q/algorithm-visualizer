name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Node.js 설치
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 패키지 설치
        run: npm install

      - name: Capacitor Android 추가
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Android SDK 버전 설정
        run: |
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 34/' android/variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 34/' android/variables.gradle

      - name: Java 설치
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Keystore 생성
        run: |
          keytool -genkey -v \
            -keystore $HOME/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: APK 빌드
        run: |
          cd android
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=$HOME/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
