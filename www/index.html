<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorithm Visualizer</title>
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/drawer.css" />
</head>
<body>

  <div class="header">
    <span class="title">Algorithm Visualizer</span>
  </div>

  <div class="stack-bar">
    <button class="menu-btn" onclick="openDrawer()">☰</button>
    <span class="stack-label" id="stack-label">STACK</span>
    <div id="stack-view"></div>
  </div>

  <div class="graph-card" id="graph-card" style="display:none;">
    <canvas id="graph-canvas"></canvas>
  </div>

  <div class="code-card">
    <div class="input-row">
      <div class="input-display" id="input-display"></div>
      <button class="input-btn" onclick="openModal()">✏️</button>
    </div>
    <div id="code-view"></div>
  </div>

  <div class="bottom-panel">
    <div class="info-row">
      <span class="action-badge" id="action"></span>
      <span class="current-char" id="current-char"></span>
    </div>
    <div class="description" id="description"></div>
    <div class="controls">
      <button onclick="prevStep()">◀</button>
      <button onclick="togglePlay()" id="play-btn">▶ Play</button>
      <button onclick="nextStep()">▶</button>
    </div>
  </div>

  <!-- 입력값 모달 -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">입력값 설정</div>
      <input class="modal-input" id="modal-input" type="text" placeholder="예: ([])" maxlength="20" />
      <div class="modal-desc" id="modal-desc">괄호만 입력해주세요</div>
      <div class="modal-buttons">
        <button class="modal-cancel" onclick="closeModal()">취소</button>
        <button class="modal-confirm" onclick="confirmInput()">확인</button>
      </div>
    </div>
  </div>

  <!-- Bottom Sheet Drawer -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="drawer-title">자료구조 선택</div>
    <div class="drawer-list" id="drawer-list"></div>
  </div>

  <!-- JS -->
  <script src="js/algorithms/stack/stack_basic.js"></script>
  <script src="js/algorithms/stack/brackets.js"></script>
  <script src="js/algorithms/stack/dfs.js"></script>
  <script src="js/algorithms/queue/queue_basic.js"></script>
  <script src="js/algorithms/queue/bfs.js"></script>
  <script src="js/main.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/drawer.js"></script>
  <script src="js/render.js"></script>
</body>
</html>
