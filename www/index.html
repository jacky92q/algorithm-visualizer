<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="header">
    <span class="title">🧠 Algorithm Visualizer</span>
    <div class="stack-inline">
      <span class="stack-label">STACK</span>
      <div id="stack-view"></div>
    </div>
  </div>

  <div class="code-card">
    <div id="code-view"></div>
  </div>

  <div class="bottom-panel">
    <div class="info-row">
      <span class="action-badge" id="action"></span>
      <span class="current-char" id="current-char"></span>
    </div>
    <div class="description" id="description"></div>
    <div class="controls">
      <button onclick="prevStep()">◀</button>
      <button onclick="togglePlay()" id="play-btn">▶ Play</button>
      <button onclick="nextStep()">▶</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
