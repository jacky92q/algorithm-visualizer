<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Algorithm Visualizer</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- Page 1: Algorithm Selection -->
  <div class="page" id="page-home">
    <div class="home-header">
      <div class="home-title">Algorithm</div>
      <div class="home-subtitle">Visualizer</div>
    </div>
    <div class="home-list" id="home-list"></div>
  </div>

  <!-- Page 2: Visualization -->
  <div class="page hidden" id="page-visual">

    <!-- Header -->
    <div class="nav-bar">
      <button class="nav-back" onclick="goBack()">‹</button>
      <span class="nav-title" id="nav-title"></span>
      <button class="nav-edit" onclick="openModal()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.5 17.5h3l11-11L13.5 3.5l-11 11v3z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M14.5 2.5l3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-desc" onclick="switchTab('desc')">Description</button>
      <button class="tab-btn" id="tab-vis" onclick="switchTab('vis')">Visualization</button>
    </div>

    <!-- Description Tab -->
    <div class="tab-content" id="content-desc">
      <div class="desc-card" id="desc-card"></div>
    </div>

    <!-- Visualization Tab -->
    <div class="tab-content hidden" id="content-vis">
      <div class="visual-card" id="visual-card"></div>
      <div class="code-card">
        <div class="code-input-row">
          <div class="code-input-display" id="input-display"></div>
        </div>
        <div id="code-view"></div>
      </div>
      <div class="status-panel">
        <div class="status-top">
          <span class="action-badge" id="action"></span>
          <span class="status-char" id="current-char"></span>
        </div>
        <div class="status-desc" id="description"></div>
        <div class="controls">
          <button class="ctrl-btn" onclick="resetToFirst()">↺</button>
          <button class="ctrl-btn" onclick="prevStep()">‹</button>
          <button class="ctrl-btn play-btn" onclick="togglePlay()" id="play-btn">▶ Play</button>
          <button class="ctrl-btn" onclick="nextStep()">›</button>
        </div>
        <div class="speed-control">
          <label for="speed-slider">Speed:</label>
          <input type="range" id="speed-slider" min="0.5" max="3" step="0.5" value="1" oninput="setPlaybackSpeed(parseFloat(this.value))" />
          <span id="speed-display">1x</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Input Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">Set Input</div>
      <input class="modal-input" id="modal-input" type="text" maxlength="30" />
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" onclick="confirmInput()">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Algorithm Files -->
  <script src="js/algorithms/stack/stack_basic.js"></script>
  <script src="js/algorithms/stack/brackets.js"></script>
  <script src="js/algorithms/stack/dfs.js"></script>
  <script src="js/algorithms/stack/rpn.js"></script>
  <script src="js/algorithms/stack/palindrome.js"></script>
  <script src="js/algorithms/queue/queue_basic.js"></script>
  <script src="js/algorithms/queue/bfs.js"></script>
  <script src="js/algorithms/queue/bfs_maze.js"></script>
  <script src="js/algorithms/linkedlist/linked_list.js"></script>
  <script src="js/algorithms/tree/binary_tree.js"></script>
  <!-- 코어 -->
  <script src="js/core/data.js"></script>
  <script src="js/core/render.js"></script>
  <script src="js/core/nav.js"></script>
  <script src="js/core/main.js"></script>
</body>
</html>
